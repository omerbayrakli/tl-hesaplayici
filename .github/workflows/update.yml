name: Ekonometri Analizi Güncelle

on:
  schedule:
    - cron: "0 6 * * *"   # Her gün sabah 06:00 UTC (09:00 TR)
  workflow_dispatch:        # Elle de çalıştırılabilir (GitHub'dan butona bas)
  push:
    paths:
      - "analysis.py"       # analysis.py değişince de çalışır

jobs:
  analiz:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # results.json'u commit edebilmek için

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Kütüphaneleri yükle
        run: |
          pip install numpy
          pip install statsmodels --quiet || echo "statsmodels kurulamadı, basit AR(2) kullanılacak"

      - name: Analizi çalıştır
        run: python analysis.py

      - name: results.json'u kaydet
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          git diff --staged --quiet || git commit -m "chore: ekonometri analizi güncellendi [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push